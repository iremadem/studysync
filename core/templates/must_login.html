{% extends 'base.html' %}

{% block content %}

<div class="text-center" style="padding: 80px 20px;">

    <div style="
        width: 90px; height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 28px auto;
        box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        font-size: 2.4rem;
    ">🔒</div>

    <h2 style="
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 2.2rem;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 14px;
    ">Sign In Required</h2>

    <p style="color: #777; font-size: 1.05rem; max-width: 420px; margin: 0 auto 36px auto; line-height: 1.7;">
        You need to be signed in to access this page. Please log in or create a free account to continue.
    </p>

    <div style="width:60px; height:3px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:2px; margin:0 auto 36px auto;"></div>

    <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="/login/" class="btn px-4 py-2" style="
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 500;
            box-shadow: 0 4px 15px rgba(102,126,234,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        "
        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 20px rgba(102,126,234,0.45)'"
        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102,126,234,0.35)'">
            🔑 Sign In
        </a>

        <a href="/register/" class="btn px-4 py-2" style="
            background: transparent; color: #667eea;
            border: 1.5px solid #667eea; border-radius: 12px;
            font-size: 1rem; font-weight: 500;
            transition: transform 0.2s, background 0.2s, color 0.2s;
        "
        onmouseover="this.style.transform='translateY(-2px)'; this.style.background='linear-gradient(135deg,#667eea,#764ba2)'; this.style.color='white'; this.style.borderColor='transparent'"
        onmouseout="this.style.transform='translateY(0)'; this.style.background='transparent'; this.style.color='#667eea'; this.style.borderColor='#667eea'">
            ✨ Create Account
        </a>
    </div>

    <div class="mt-4">
        <a href="javascript:history.back()" style="color:#aaa; font-size:0.9rem; text-decoration:none;">
            ← Go back
        </a>
    </div>
</div>

{% endblock %}
