{% extends 'base.html' %}
{% block content %}

<style>
    .edit-input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid rgba(102,126,234,0.25);
        border-radius: 10px;
        font-size: 0.97rem;
        color: #333;
        background: #fafafa;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
    }
    .edit-input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
        background: #fff;
    }
    .edit-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #555;
        margin-bottom: 6px;
        display: block;
    }
</style>

<div style="max-width:580px; margin:40px auto;">

    <a href="/room/{{ room.id }}/" style="color:#aaa; font-size:0.88rem; text-decoration:none; display:inline-block; margin-bottom:20px;">
        ← Back to Room
    </a>

    <div style="
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(102,126,234,0.12);
        border: 1.5px solid rgba(102,126,234,0.1);
    ">
        <!-- Icon & Title -->
        <div style="text-align:center; margin-bottom:32px;">
            <div style="
                width:60px; height:60px; border-radius:50%;
                background:linear-gradient(135deg,#667eea,#764ba2);
                display:flex; align-items:center; justify-content:center;
                margin:0 auto 14px; font-size:1.6rem;
                box-shadow:0 6px 18px rgba(102,126,234,0.3);
            ">✏️</div>
            <h3 style="font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:1.6rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;">
                Edit Room
            </h3>
            <p style="color:#aaa;font-size:0.9rem;">Changes will be visible to all participants immediately.</p>
            <div style="width:40px;height:3px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:2px;margin:14px auto 0;"></div>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div style="margin-bottom:20px;">
                <label class="edit-label">Room Title</label>
                <input class="edit-input" type="text" name="title" value="{{ room.title }}" required>
            </div>

            <div style="margin-bottom:20px;">
                <label class="edit-label">Subject</label>
                <input class="edit-input" type="text" name="subject" value="{{ room.subject }}" required>
            </div>

            <div style="margin-bottom:28px;">
                <label class="edit-label">Description</label>
                <textarea class="edit-input" name="description" rows="4" style="resize:vertical;">{{ room.description }}</textarea>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn flex-grow-1" style="
                    background:linear-gradient(135deg,#667eea,#764ba2);
                    color:white; border:none; border-radius:12px;
                    padding:13px; font-size:1rem; font-weight:600;
                    box-shadow:0 4px 15px rgba(102,126,234,0.3);
                    transition:transform 0.2s;"
                onmouseover="this.style.transform='translateY(-2px)'"
                onmouseout="this.style.transform='translateY(0)'">
                    💾 Save Changes
                </button>
                <a href="/room/{{ room.id }}/" class="btn" style="
                    background:transparent; color:#aaa;
                    border:1.5px solid rgba(102,126,234,0.2);
                    border-radius:12px; padding:13px 24px; font-size:1rem;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
